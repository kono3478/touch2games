<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617; /* ステージ外の色 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        /* 9:16固定のゲームステージ */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: calc(100vh * 9 / 16);
            max-height: calc(100vw * 16 / 9);
            aspect-ratio: 9 / 16;
            background-color: #0f172a;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* UIヘッダー */
        .game-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 200;
        }

        /* 共通操作エリア（四隅） */
        .tap-zone {
            position: absolute;
            width: 46%;
            height: 42%;
            pointer-events: auto;
            transition: background 0.1s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        
        .m1-zone { color: rgba(255, 255, 255, 0.05); background: transparent; border: 1px dashed rgba(255,255,255,0.02); }
        .m1-zone:active { background: rgba(56, 189, 248, 0.15); color: rgba(255, 255, 255, 0.4); }

        .m2-zone { color: transparent; background: transparent; border: 1px solid transparent; }
        .m2-zone:active { background: rgba(245, 158, 11, 0.25); border-color: rgba(245, 158, 11, 0.4); color: rgba(255, 255, 255, 0.4); }

        .pos-tl { top: 80px; left: 2%; border-radius: 24px; }
        .pos-tr { top: 80px; right: 2%; border-radius: 24px; }
        .pos-bl { bottom: 3%; left: 2%; border-radius: 24px; }
        .pos-br { bottom: 3%; right: 2%; border-radius: 24px; }

        #lift-gauge {
            position: absolute;
            bottom: 25%;
            width: 70%;
            height: 12px;
            background: rgba(0,0,0,0.8);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
            z-index: 110;
        }
        #lift-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #f59e0b, #fbbf24);
        }

        /* スコアポップアップエフェクト */
        .score-pop {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            z-index: 50;
            text-align: center;
            transform: translate(-50%, -50%);
        }

        .pop-normal {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 1.5rem;
            animation: collect-pop-normal 0.3s ease-out forwards;
        }
        @keyframes collect-pop-normal {
            0% { transform: translate(-50%, 0) scale(0.6); opacity: 1; }
            100% { transform: translate(-50%, -60px) scale(1.0); opacity: 1; }
        }

        .pop-great {
            color: #f97316;
            text-shadow: 0 0 15px rgba(249, 115, 22, 0.6);
            font-size: 1.5rem;
            animation: collect-pop-great 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes collect-pop-great {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(2.0); opacity: 1; }
        }

        .pop-excellent {
            color: #ec4899;
            text-shadow: 0 0 20px rgba(236, 72, 153, 0.8);
            font-size: 1.5rem;
            animation: collect-pop-excellent 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }
        @keyframes collect-pop-excellent {
            0% { transform: translate(-50%, 0) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -160px) scale(4.0); opacity: 1; }
        }

        .pop-legendary {
            background: linear-gradient(to right, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.9));
            font-size: 2rem;
            animation: collect-pop-legendary 0.55s ease-in-out forwards;
        }
        @keyframes collect-pop-legendary {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(3.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(6.0); opacity: 1; }
        }

        .pop-m2-fixed {
            font-size: 2.8rem !important;
            animation: collect-pop-m2 0.4s ease-out forwards !important;
        }
        @keyframes collect-pop-m2 {
            0% { transform: translate(-50%, -30%) scale(1.0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
        }

        .pop-penalty {
            color: #ff3333;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.8), 0 0 10px white;
            font-size: 1.5rem;
            animation: collect-pop-penalty 0.75s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        @keyframes collect-pop-penalty {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            10% { transform: translate(-50%, -50%) scale(8.0); opacity: 1; }
            85% { transform: translate(-50%, -50%) scale(8.0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(8.0); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-stage">
    <canvas id="gameCanvas"></canvas>

    <div id="game-header" class="game-header hidden">
        <div class="flex flex-col">
            <span class="text-[9px] text-slate-400 font-black uppercase tracking-wider">Time</span>
            <span id="timer" class="text-2xl font-mono font-black text-rose-500 leading-none">0.0</span>
        </div>
        <div class="text-white font-black text-xl italic tracking-tighter opacity-70" id="mode-display">MODE</div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] text-slate-400 font-black uppercase tracking-wider">Score</span>
            <span id="score" class="text-2xl font-mono font-black text-yellow-400 leading-none">0</span>
        </div>
    </div>

    <!-- モード1操作 -->
    <div id="m1-ui" class="ui-overlay hidden">
        <div class="tap-zone m1-zone pos-tl" onmousedown="jumpM1('left', true)" ontouchstart="jumpM1('left', true)">↖️ PULL LEFT</div>
        <div class="tap-zone m1-zone pos-tr" onmousedown="jumpM1('right', true)" ontouchstart="jumpM1('right', true)">PULL RIGHT ↗️</div>
        <div class="tap-zone m1-zone pos-bl" onmousedown="jumpM1('right', false)" ontouchstart="jumpM1('right', false)">CROSS RIGHT ↗️</div>
        <div class="tap-zone m1-zone pos-br" onmousedown="jumpM1('left', false)" ontouchstart="jumpM1('left', false)">↖️ CROSS LEFT</div>
    </div>

    <!-- モード2操作 -->
    <div id="m2-ui" class="ui-overlay hidden">
        <div class="tap-zone m2-zone pos-tl" onmousedown="inputM2()" ontouchstart="inputM2()">DROP / LIFT</div>
        <div class="tap-zone m2-zone pos-tr" onmousedown="inputM2()" ontouchstart="inputM2()">DROP / LIFT</div>
        <div class="tap-zone m2-zone pos-bl" onmousedown="inputM2()" ontouchstart="inputM2()">DROP / LIFT</div>
        <div class="tap-zone m2-zone pos-br" onmousedown="inputM2()" ontouchstart="inputM2()">DROP / LIFT</div>
        <div id="lift-gauge"><div id="lift-fill"></div></div>
    </div>

    <div id="title-screen" class="ui-overlay justify-center bg-slate-900 pointer-events-auto">
        <div class="text-8xl mb-6">🕹️</div>
        <h1 class="text-5xl font-black text-white mb-2 italic uppercase tracking-tighter">Master Arcade</h1>
        <p class="text-slate-400 font-bold mb-12 tracking-widest text-sm uppercase">Select Mode</p>
        <div class="flex flex-col gap-5 w-72 px-4">
            <button onclick="startGame(1)" class="bg-sky-500 text-white font-black py-5 rounded-2xl shadow-[0_6px_0_rgb(3,105,161)] active:translate-y-1 active:shadow-none transition-all text-xl uppercase italic">Mode 1: Jump Attack</button>
            <button onclick="startGame(2)" class="bg-amber-500 text-white font-black py-5 rounded-2xl shadow-[0_8px_0_rgb(180,83,9)] active:translate-y-1 active:shadow-none transition-all text-xl uppercase italic">Mode 2: Magnet Master</button>
        </div>
    </div>

    <div id="result-screen" class="ui-overlay justify-center bg-slate-950/95 hidden pointer-events-auto px-6" style="z-index: 500;">
        <h2 id="result-title" class="text-6xl font-black text-white mb-6 italic">TIME UP!</h2>
        <div class="bg-white/5 p-10 rounded-[3.5rem] border border-white/10 text-center mb-10 w-full max-w-xs shadow-2xl">
            <p class="text-slate-500 text-xs font-black uppercase tracking-widest mb-3">Final Score</p>
            <p id="final-score" class="text-6xl font-black text-yellow-400">0</p>
        </div>
        <div class="flex flex-col gap-4 w-72">
            <button onclick="retryGame()" class="w-full bg-white text-slate-900 font-black py-5 rounded-2xl text-2xl active:scale-95 transition-all">RETRY</button>
            <button onclick="showTitle()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl text-xl border border-white/10 active:scale-95 transition-all">TITLE</button>
        </div>
    </div>
</div>

<script>
    const stage = document.getElementById('game-stage');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const finalScoreEl = document.getElementById('final-score');
    const liftFill = document.getElementById('lift-fill');
    
    // サウンド設定
    const JUMP_SE_URL = 'https://raw.githubusercontent.com/kono3478/sozai/main/se_jump_001.wav';
    const jumpSound = new Audio(JUMP_SE_URL);
    jumpSound.volume = 0.4;

    const get1Sound = new Audio('https://raw.githubusercontent.com/kono3478/sozai/main/Get1.mp3');
    const get2Sound = new Audio('https://raw.githubusercontent.com/kono3478/sozai/main/Get2.mp3');
    const get3Sound = new Audio('https://raw.githubusercontent.com/kono3478/sozai/main/Get3.mp3');
    get1Sound.volume = 0.5; get2Sound.volume = 0.5; get3Sound.volume = 0.5;

    // BGM設定
    const BGM1_URL = 'https://raw.githubusercontent.com/kono3478/sozai/main/maou_bgm_8bit14.mp3';
    const bgm1 = new Audio(BGM1_URL);
    bgm1.loop = true; bgm1.volume = 0.3;

    const BGM2_URL = 'https://raw.githubusercontent.com/kono3478/sozai/main/maou_bgm_8bit22.mp3';
    const bgm2 = new Audio(BGM2_URL);
    bgm2.loop = true; bgm2.volume = 0.3;

    let mode = 1;
    let gameState = 'title';
    let score = 0;
    let timeLeft = 30;
    let lastTime = 0;
    let animationId = null;

    const PHYS = {
        m1: { grav: 0.55, jX: 8.5, jY: -15, itemS: [10, 20, 50] },
        m2: { 
            speed: 4.8, dropS: 9.8, liftPow: 20, 
            decayTable: [0, 0.4, 1.2, 2.8], itemSize: 38, rollFric: 0.95 
        }
    };

    const player = { x: 0, y: 0, r: 22, vx: 0, vy: 0, rot: 0, pull: false, pT: 0 };
    let m1Platforms = [];
    let m1Items = [];

    const crane = { x: 0, y: 130, state: 'move', dY: 0, items: [], force: 0, dir: 1, lastAct: 0 };
    let m2Items = [];
    let spawnTimer = 0;
    let spawnInterval = 2000;

    function resize() {
        canvas.width = stage.clientWidth;
        canvas.height = stage.clientHeight;
    }

    function startGame(m) {
        mode = m; gameState = 'play'; score = 0;
        m1Items = []; m1Platforms = []; m2Items = [];
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('game-header').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('m1-ui').className = m === 1 ? 'ui-overlay' : 'ui-overlay hidden';
        document.getElementById('m2-ui').className = m === 2 ? 'ui-overlay' : 'ui-overlay hidden';
        document.getElementById('mode-display').textContent = m === 1 ? 'JUMP' : 'MAGNET';
        resize();
        
        if (m === 1) {
            timeLeft = 30; player.x = canvas.width / 2; player.y = canvas.height * 0.65; player.vx = player.vy = player.rot = 0;
            m1Platforms.push({ x: 0, y: player.y + 100, w: canvas.width, h: 250 });
            for (let i = 1; i < 8; i++) spawnM1Platform(player.y - (i * (canvas.height / 8)));
            bgm2.pause(); bgm1.currentTime = 0; bgm1.play().catch(() => {});
        } else {
            timeLeft = 60; crane.x = canvas.width / 2; crane.state = 'move'; crane.dY = 0; crane.items = []; crane.lastAct = 0;
            spawnInterval = 2000; spawnTimer = 0;
            for(let i=0; i<3; i++) spawnM2Item();
            bgm1.pause(); bgm2.currentTime = 0; bgm2.play().catch(() => {});
        }
        lastTime = performance.now();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(loop);
    }

    function retryGame() { if (gameState === 'over') startGame(mode); }

    function showTitle() {
        gameState = 'title';
        if (animationId) cancelAnimationFrame(animationId);
        bgm1.pause(); bgm1.currentTime = 0;
        bgm2.pause(); bgm2.currentTime = 0;
        document.getElementById('title-screen').classList.remove('hidden');
        document.getElementById('game-header').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('m1-ui').classList.add('hidden');
        document.getElementById('m2-ui').classList.add('hidden');
    }

    function spawnM1Platform(y) {
        const w = 120 + Math.random() * 80; const x = Math.random() * (canvas.width - w);
        m1Platforms.push({ x, y, w, h: 20 });
        if (Math.random() < 0.8) {
            const r = Math.random(); m1Items.push({ x: x + w/2, y: y - 40, type: r > 0.9 ? 2 : (r > 0.7 ? 1 : 0), collected: false });
        }
    }

    function spawnM2Item() {
        const r = Math.random();
        m2Items.push({ 
            x: 50 + Math.random() * (canvas.width - 100), y: -50, 
            vx: (Math.random() - 0.5) * 7, vy: 1 + Math.random() * 2,
            type: r > 0.92 ? 2 : (r > 0.75 ? 1 : 0), collected: false, settled: false 
        });
    }

    function jumpM1(dir, isPull) {
        if (gameState !== 'play' || mode !== 1) return;
        jumpSound.currentTime = 0; jumpSound.play().catch(() => {});
        player.vy = isPull ? PHYS.m1.jY * 1.05 : PHYS.m1.jY;
        player.pull = isPull; player.pT = 12;
        player.vx = dir === 'right' ? PHYS.m1.jX : -PHYS.m1.jX;
    }

    function inputM2() {
        if (gameState !== 'play' || mode !== 2) return;
        if (Date.now() - crane.lastAct < 1000) return;
        if (crane.state === 'move') crane.state = 'drop';
        else if (crane.state === 'lift') crane.force = Math.min(100, crane.force + PHYS.m2.liftPow);
    }

    function loop(t) {
        if (gameState !== 'play') return;
        const dt = t - lastTime; lastTime = t;
        timeLeft -= dt / 1000; timerEl.textContent = Math.max(0, timeLeft).toFixed(1);
        scoreEl.textContent = score;
        if (timeLeft <= 0) endGame("TIME UP!");
        if (mode === 1) updateM1(); else updateM2(dt);
        draw();
        animationId = requestAnimationFrame(loop);
    }

    function updateM1() {
        let g = PHYS.m1.grav; if (player.pull && player.pT-- > 0) g *= 0.5;
        player.vy += g; player.x += player.vx; player.y += player.vy; player.rot += player.vx * 0.05;
        if (player.x < 0 || player.x > canvas.width) player.vx *= -0.5;
        m1Platforms.forEach(p => {
            if (player.vy > 0 && player.x > p.x && player.x < p.x + p.w && player.y + player.r > p.y && player.y + player.r < p.y + p.h + player.vy) {
                player.y = p.y - player.r; player.vy = 0; player.vx *= 0.85; player.pull = false;
            }
        });
        m1Items.forEach(i => {
            if (!i.collected && Math.hypot(player.x - i.x, player.y - i.y) < 45) {
                i.collected = true; 
                const gain = PHYS.m1.itemS[i.type];
                score += gain; pop(i.x, i.y, "+" + gain, gain);
            }
        });
        const focus = canvas.height * 0.65;
        if (player.y > canvas.height) { 
            player.x = canvas.width / 2; player.y = canvas.height * 0.2; player.vx = player.vy = 0;
            const penalty = 100; score = Math.max(0, score - penalty); 
            pop(canvas.width / 2, canvas.height / 2, "-" + penalty, -penalty);
        } else if (player.y < focus) {
            const s = focus - player.y; player.y = focus;
            m1Platforms.forEach(p => p.y += s); m1Items.forEach(i => i.y += s);
            m1Platforms = m1Platforms.filter(p => p.y < canvas.height + 300);
            while (m1Platforms.length < 8) spawnM1Platform(Math.min(...m1Platforms.map(p => p.y)) - (canvas.height / 8));
        }
    }

    function updateM2(dt) {
        spawnTimer += dt;
        if (spawnTimer > spawnInterval) { spawnM2Item(); spawnTimer = 0; spawnInterval = Math.max(750, spawnInterval - 30); }
        m2Items.forEach(i => {
            if (!i.settled && !i.collected) {
                i.vy += 0.22; i.x += i.vx; i.y += i.vy; i.vx *= PHYS.m2.rollFric;
                if (i.y > canvas.height - 40) { i.y = canvas.height - 40; i.vy = 0; i.vx *= 0.7; if(Math.abs(i.vx)<0.15) i.settled = true; }
                if (i.x < 35) { i.x = 35; i.vx *= -0.4; } else if (i.x > canvas.width - 35) { i.x = canvas.width - 35; i.vx *= -0.4; }
                m2Items.forEach(target => {
                    if (target !== i && target.settled && !target.collected) {
                        const dist = Math.hypot(i.x - target.x, i.y - target.y);
                        if (dist < PHYS.m2.itemSize) {
                            const ang = Math.atan2(i.y - target.y, i.x - target.x);
                            i.vx += Math.cos(ang) * 1.5; i.y = target.y - 32;
                            if (Math.abs(i.vx) < 0.15) i.settled = true;
                        }
                    }
                });
                if (i.settled && i.y < 185) endGame("STACK OVER!");
            }
        });
        const now = Date.now();
        if (now - crane.lastAct < 1000) {
            crane.x += crane.dir * (PHYS.m2.speed * 0.65);
            if (crane.x < 65 || crane.x > canvas.width - 65) crane.dir *= -1;
        } else if (crane.state === 'move') {
            crane.x += crane.dir * PHYS.m2.speed;
            if (crane.x < 65 || crane.x > canvas.width - 65) crane.dir *= -1;
        } else if (crane.state === 'drop') {
            crane.dY += PHYS.m2.dropS;
            if (crane.dY > canvas.height - 210) crane.state = 'grab';
            let hit = m2Items.find(i => !i.collected && i.settled && Math.hypot(crane.x - i.x, (crane.y + crane.dY) - i.y) < 60);
            if (hit) {
                let picked = [hit];
                let others = m2Items.filter(i => !i.collected && i.settled && i !== hit);
                for (let item of others) {
                    if (picked.length >= 3) break;
                    if (picked.some(p => Math.hypot(p.x - item.x, p.y - item.y) < PHYS.m2.itemSize + 10)) { picked.push(item); }
                }
                crane.items = picked; crane.state = 'grab';
            }
        } else if (crane.state === 'grab') {
            crane.state = 'lift'; crane.force = 40; document.getElementById('lift-gauge').style.display = 'block';
        } else if (crane.state === 'lift') {
            liftFill.style.width = crane.force + '%';
            const count = crane.items.length;
            const decay = PHYS.m2.decayTable[count] || 0.4;
            crane.force = Math.max(0, crane.force - decay);
            let up = (crane.force / 100) * 12.5 - (count * 2.0); 
            crane.dY -= up;
            crane.items.forEach((i, idx) => { 
                i.x = crane.x + (idx === 0 ? 0 : (idx === 1 ? -20 : 20)); 
                i.y = crane.y + crane.dY + 50; i.settled = false; i.vx = i.vy = 0; 
            });
            if (crane.dY <= 0) {
                if (crane.items.length > 0) {
                    const currentCount = crane.items.length;
                    if (currentCount === 1) { get1Sound.currentTime = 0; get1Sound.play().catch(()=>{}); }
                    else if (currentCount === 2) { get2Sound.currentTime = 0; get2Sound.play().catch(()=>{}); }
                    else if (currentCount === 3) { get3Sound.currentTime = 0; get3Sound.play().catch(()=>{}); }

                    let gain = 0; let popTxt = "";
                    crane.items.forEach((i, idx) => {
                        const itemScore = PHYS.m1.itemS[i.type];
                        if (idx === 0) gain = itemScore; else gain *= itemScore;
                        i.collected = true;
                        popTxt += (idx === 0 ? "" : "×") + itemScore;
                    });
                    score += gain;
                    const displayMsg = (currentCount > 1) ? (popTxt + " = " + gain) : gain;
                    pop(canvas.width / 2, canvas.height / 2, displayMsg, gain);
                }
                resetCrane();
            } else if (crane.dY > canvas.height - 40) resetCrane();
        }
    }

    function resetCrane() {
        crane.state = 'move'; crane.dY = 0; crane.items = []; crane.force = 0;
        crane.lastAct = Date.now(); document.getElementById('lift-gauge').style.display = 'none';
    }

    function pop(x, y, txt, val) {
        const d = document.createElement('div');
        let rank = "pop-normal";
        if (val === -100) rank = "pop-penalty";
        else if (val >= 1000) rank = "pop-legendary";
        else if (val >= 50) rank = "pop-excellent";
        else if (val >= 20) rank = "pop-great";
        else rank = "pop-normal";
        
        if (mode === 2 && val > 0) { d.classList.add('pop-m2-fixed'); }
        d.className += ` score-pop ${rank}`;
        d.style.left = x + 'px'; d.style.top = y + 'px'; d.textContent = txt;
        stage.appendChild(d);
        setTimeout(() => d.remove(), 800);
    }

    function endGame(reason) {
        gameState = 'over';
        bgm1.pause(); bgm2.pause();
        document.getElementById('result-title').textContent = reason;
        finalScoreEl.textContent = score;
        document.getElementById('m1-ui').classList.add('hidden');
        document.getElementById('m2-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const emojis = ["⭐", "🍒", "💎"];
        if (mode === 1) {
            m1Platforms.forEach(p => { ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 8); ctx.fill(); });
            m1Items.forEach(i => { if(!i.collected) { ctx.font = '34px Arial'; ctx.textAlign = 'center'; ctx.fillText(emojis[i.type], i.x, i.y + Math.sin(Date.now()/150)*10); } });
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.rot); ctx.fillStyle = '#38bdf8'; ctx.shadowBlur = 20; ctx.shadowColor = '#38bdf8'; ctx.beginPath(); ctx.roundRect(-22,-22,44,44,12); ctx.fill(); ctx.restore();
        } else {
            m2Items.forEach(i => { if(!i.collected) { ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emojis[i.type], i.x, i.y); } });
            ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(crane.x, 0); ctx.lineTo(crane.x, crane.y + crane.dY); ctx.stroke();
            
            ctx.save();
            ctx.translate(crane.x, crane.y + crane.dY);
            const isCooling = Date.now() - crane.lastAct < 1000;
            const magR = 25; ctx.lineWidth = 14; ctx.lineCap = 'round';
            const colorN = isCooling ? '#475569' : '#ef4444';
            const colorS = isCooling ? '#94a3b8' : '#3b82f6';
            ctx.strokeStyle = colorN;
            ctx.beginPath(); ctx.arc(0, 0, magR, Math.PI, Math.PI * 1.5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-magR, 0); ctx.lineTo(-magR, 28); ctx.stroke();
            ctx.strokeStyle = colorS;
            ctx.beginPath(); ctx.arc(0, 0, magR, Math.PI * 1.5, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(magR, 0); ctx.lineTo(magR, 28); ctx.stroke();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(-magR, 24); ctx.lineTo(-magR, 28); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(magR, 24); ctx.lineTo(magR, 28); ctx.stroke();
            ctx.restore();
        }
    }
    window.addEventListener('resize', resize); resize();
</script>
